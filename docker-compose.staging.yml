services:
  travel-api:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: travel-api-staging
    env_file:
      - ${APP_ENV_FILE:-.env.staging}
    ports:
      - "${API_PORT:-5000}:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  travel-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.staging
      args:
        VITE_SHOW_SAJU_LINK: ${VITE_SHOW_SAJU_LINK:-false}
        VITE_SAJU_SERVICE_URL: ${VITE_SAJU_SERVICE_URL:-}
    container_name: travel-frontend-staging
    depends_on:
      - travel-api
    ports:
      - "${FRONTEND_PORT:-4175}:80"
    restart: unless-stopped
